<script>

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function openSection(id){

    document.querySelectorAll("video").forEach(video => {
        video.pause();
        video.currentTime = 0;
    });

    ["frameArea","souvenirArea","packageArea"].forEach(section => {
        let element = document.getElementById(section);
        if(element){
            element.style.display = "none";
        }
    });

    let selected = document.getElementById(id);

    if(selected){
        selected.style.display = "block";
        selected.scrollIntoView({behavior:"smooth"});
    }

    // Play frame video
    if(id === "frameArea"){
        setTimeout(()=>{
            let video = document.querySelector("#frameArea video");
            if(video){
                video.muted = false;
                video.play();
            }
        },300);
    }
}

function orderNow(item,price){
const msg=`🛒 ORDER FROM ACHIEVER CREATIVE HUB

Item: ${item}
Price: ${price}`;

window.open(`https://wa.me/233246703859?text=${encodeURIComponent(msg)}`);
}

function selectType(btn, price){
let parent = btn.closest(".frame-card");
let buttons = parent.querySelectorAll(".types button");

buttons.forEach(b => b.classList.remove("active"));
btn.classList.add("active");

parent.querySelector(".price").textContent = price;
parent.setAttribute("data-price", price);
}

function orderSouvenir(btn, item){
let parent = btn.closest(".frame-card");
let price = parent.getAttribute("data-price");

if(!price){
alert("Select Few or Bulk");
return;
}

orderNow(item, price);
}

document.addEventListener("DOMContentLoaded", function () {
document.addEventListener("DOMContentLoaded", function () {

    // 🔒 keep all sections closed on load
    ["frameArea","souvenirArea","packageArea"].forEach(x=>{
        document.getElementById(x).style.display="none";
    });

    // hide loader
    setTimeout(() => {

});
setTimeout(() => {
document.getElementById("loader").style.display="none";
}, 600);
});

function openModal(src){
document.getElementById("imageModal").style.display = "flex";
document.getElementById("modalImg").src = src;
}

function closeModal(){
    const modal = document.getElementById("imageModal");

    // STOP any playing video inside modal
    const video = modal.querySelector("video");
    if(video){
        video.pause();
        video.currentTime = 0;
    }

    modal.style.display = "none";
}

let zoomLevel = 1;

function zoomIn(){
zoomLevel += 0.2;
document.getElementById("modalImg").style.transform = `scale(${zoomLevel})`;
}

function zoomOut(){
if(zoomLevel > 0.4){
zoomLevel -= 0.2;
document.getElementById("modalImg").style.transform = `scale(${zoomLevel})`;
}
}

function resetZoom(){
zoomLevel = 1;
document.getElementById("modalImg").style.transform = `scale(1)`;
}

let galleryItems = [];
let currentIndex = 0;

function openGallery(items, index){
    galleryItems = items;
    currentIndex = index;
    document.getElementById("imageModal").style.display = "flex";
    showItem();
}

function showItem(){
    const modal = document.getElementById("modalImg");

    let item = galleryItems[currentIndex];

    // detect video
    if(item.endsWith(".mp4")){
        modal.outerHTML = `<video id="modalImg" controls autoplay style="max-width:95%;max-height:95%;">
            <source src="${item}">
        </video>`;
    } else {
        modal.outerHTML = `<img id="modalImg" src="${item}" style="max-width:95%;max-height:95%;">`;
    }
}

function nextImage(){
    currentIndex = (currentIndex + 1) % galleryItems.length;
    showItem();
}

function prevImage(){
    currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
    showItem();
}

function playFrameVideoWithSound(){
    let video = document.querySelector("#frameArea video");
    if(video){
        video.muted = false;
        video.play();
    }
}

// ✅ STOP VIDEOS WHEN NOT IN VIEW (SCROLL)
function handleVideoVisibility(){
    const videos = document.querySelectorAll("video");

    videos.forEach(video => {
        const rect = video.getBoundingClientRect();

        // 🔥 control how much of the video must be visible
        const visibleHeight = Math.min(rect.bottom, window.innerHeight) - Math.max(rect.top, 0);
        const videoHeight = rect.height;

        // 👇 adjust this value (0.6 = 60% must be visible)
        const visibilityThreshold = 0.6;

        if(visibleHeight / videoHeight >= visibilityThreshold){
            video.play();
        } else {
            video.pause();
            video.currentTime = 0;
        }
    });
}

// run on scroll
window.addEventListener("scroll", handleVideoVisibility);

function openPriceList(src){

    // open modal
    document.getElementById("imageModal").style.display = "flex";

    // force image mode only (NO gallery system)
    const modal = document.getElementById("modalImg");

    // stop any gallery/video switching
    galleryItems = [];
    currentIndex = 0;

    // ensure it's always an image
    modal.outerHTML = `<img id="modalImg" src="${src}" style="max-width:95%;max-height:95%;">`;
}

document.addEventListener("DOMContentLoaded", function () {

  // Handle images only (safer)
  const images = document.querySelectorAll("img");

  images.forEach(img => {

    // Hide if empty or placeholder
    if (!img.getAttribute("src") || img.src.includes("picsum.photos")) {
      const card = img.closest(".frame-card, .gallery-card");
      if (card) card.style.display = "none";
    }

    // Hide if image fails
    img.onerror = function () {
      const card = img.closest(".frame-card, .gallery-card");
      if (card) card.style.display = "none";
    };

  });

});

// MOBILE SWIPE SUPPORT FOR IMAGE MODAL

let touchStartX = 0;
let touchEndX = 0;

const modal = document.getElementById("imageModal");

modal.addEventListener("touchstart", function(e){
    touchStartX = e.changedTouches[0].screenX;
});

modal.addEventListener("touchend", function(e){
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe(){

    let swipeDistance = touchEndX - touchStartX;

    // Swipe left = Next image
    if(swipeDistance < -50){
        nextImage();
    }

    // Swipe right = Previous image
    if(swipeDistance > 50){
        prevImage();
    }
}

document.addEventListener("DOMContentLoaded", function(){

    const heroVideo = document.querySelector(".hero video");

    if(heroVideo){

document.getElementById("coreDescription").innerHTML = description;

document.getElementById("coreValueModal").style.display="none";

if(e.target === this){

closeCoreValue();

}

}

function toggleServices(event){

    .classList.toggle("show");
